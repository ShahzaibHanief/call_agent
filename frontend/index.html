<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اردو آواز اسسٹنٹ | Urdu Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Nastaliq Urdu', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 1400px; width: 100%; display: flex; gap: 24px; flex-wrap: wrap; }
        .phone-card {
            flex: 2; min-width: 350px; background: rgba(18, 22, 48, 0.9);
            backdrop-filter: blur(20px); border-radius: 48px; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
        .status-bar {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            padding: 20px 24px; text-align: center;
        }
        .call-status { font-size: 13px; font-weight: 500; opacity: 0.9; color: white; }
        .call-timer { font-size: 34px; font-weight: 700; font-family: monospace; margin-top: 6px; color: white; }
        .badge { display: inline-block; margin-top: 8px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.2); color: white; }
        .wave-container { display: flex; justify-content: center; align-items: center; gap: 6px; height: 50px; margin: 15px 0 5px; }
        .wave { width: 4px; background: #2ecc71; border-radius: 4px; transition: height 0.1s ease; }
        .avatar-container { text-align: center; padding: 20px 0 10px; }
        .avatar {
            width: 100px; height: 100px; background: linear-gradient(135deg, #27ae60, #2ecc71);
            border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
            font-size: 48px; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(46,204,113,0.4);
        }
        .avatar.speaking { animation: pulse 0.8s infinite; }
        .avatar.listening { animation: listeningPulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes listeningPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .conversation-area {
            height: 400px; overflow-y: auto; padding: 20px;
            background: rgba(10, 14, 39, 0.6); display: flex; flex-direction: column; gap: 12px;
        }
        .message {
            max-width: 85%; padding: 12px 18px; border-radius: 24px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; align-self: flex-end; border-bottom-right-radius: 6px;
        }
        .message.bot {
            background: rgba(30, 36, 72, 0.9); color: #e0e0e0;
            align-self: flex-start; border-bottom-left-radius: 6px;
            border: 1px solid rgba(46,204,113,0.3);
            font-family: 'Noto Nastaliq Urdu', Tahoma, sans-serif;
            font-size: 16px;
            line-height: 1.6;
        }
        .message-text { font-size: 15px; line-height: 1.5; word-break: break-word; }
        .message-time { font-size: 9px; opacity: 0.5; display: block; margin-top: 6px; }
        .typing-indicator {
            background: rgba(30, 36, 72, 0.9); padding: 12px 20px; border-radius: 24px;
            align-self: flex-start; display: flex; gap: 6px;
        }
        .typing-indicator span { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; animation: typingAnim 1.4s infinite; }
        @keyframes typingAnim { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-8px); opacity: 1; } }
        .controls { padding: 20px; background: rgba(15, 19, 34, 0.9); border-top: 1px solid rgba(46,204,113,0.2); text-align: center; }
        .call-button {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #28a745, #20c997); color: white;
            font-size: 32px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(40,167,69,0.4);
        }
        .call-button.active { background: linear-gradient(135deg, #dc3545, #c82333); box-shadow: 0 8px 20px rgba(220,53,69,0.4); }
        .status-text { font-size: 12px; color: #8892b0; margin-top: 16px; }
        .settings-card {
            flex: 1; min-width: 300px; background: rgba(18, 22, 48, 0.9);
            backdrop-filter: blur(20px); border-radius: 32px; padding: 24px;
            border: 1px solid rgba(46,204,113,0.3);
        }
        .settings-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #2ecc71; }
        .settings-header i { font-size: 28px; color: #2ecc71; }
        .settings-header h2 { font-size: 20px; font-weight: 600; color: white; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; color: #c0c0c0; font-size: 13px; font-weight: 500; margin-bottom: 8px; }
        textarea {
            width: 100%; padding: 12px 14px; background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(46,204,113,0.3); border-radius: 16px;
            color: #e0e0e0; font-family: 'Noto Nastaliq Urdu', Tahoma, sans-serif;
            font-size: 14px; resize: vertical;
        }
        textarea:focus { outline: none; border-color: #2ecc71; }
        .btn-primary {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white; border: none; border-radius: 16px; font-size: 14px;
            font-weight: 600; cursor: pointer; margin-top: 8px;
        }
        .btn-secondary {
            width: 100%; padding: 12px; background: rgba(42, 48, 85, 0.8);
            color: #e0e0e0; border: 1px solid rgba(46,204,113,0.3);
            border-radius: 16px; font-size: 14px; cursor: pointer; margin-top: 10px;
        }
        .info-note { font-size: 11px; color: #2ecc71; margin-top: 10px; text-align: center; }
        .conversation-area::-webkit-scrollbar { width: 4px; }
        .conversation-area::-webkit-scrollbar-track { background: rgba(10, 14, 39, 0.5); }
        .conversation-area::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 4px; }
        @media (max-width: 900px) {
            .container { padding: 16px; }
            .phone-card { min-width: 280px; }
            .conversation-area { height: 280px; }
            .call-button { width: 70px; height: 70px; font-size: 28px; }
            .avatar { width: 80px; height: 80px; font-size: 38px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="phone-card">
            <div class="status-bar">
                <div class="call-status" id="callStatus"><i class="fas fa-phone-slash"></i> <span>منسلک نہیں</span></div>
                <div class="call-timer" id="callTimer">00:00</div>
                <div class="badge"><i class="fas fa-female"></i> اردو اسسٹنٹ | Urdu Assistant</div>
            </div>
            <div class="wave-container" id="waveContainer" style="display: none;">
                <div class="wave" style="height: 15px;"></div><div class="wave" style="height: 25px;"></div>
                <div class="wave" style="height: 35px;"></div><div class="wave" style="height: 45px;"></div>
                <div class="wave" style="height: 35px;"></div><div class="wave" style="height: 25px;"></div>
                <div class="wave" style="height: 15px;"></div>
            </div>
            <div class="avatar-container"><div class="avatar" id="avatar">👩</div></div>
            <div class="conversation-area" id="conversationArea">
                <div class="message bot">
                    <div class="message-text">🌟 اردو آواز اسسٹنٹ تیار ہے!</div>
                    <span class="message-time">ابھی</span>
                </div>
            </div>
            <div class="controls">
                <button class="call-button" id="callButton"><i class="fas fa-phone-alt"></i></button>
                <div class="status-text" id="statusText"><i class="fas fa-info-circle"></i> <span>کال شروع کرنے کے لیے سبز بٹن دبائیں</span></div>
            </div>
        </div>
        <div class="settings-card">
            <div class="settings-header"><i class="fas fa-female"></i><h2>بوٹ ٹریننگ</h2></div>
           
            <div class="form-group">
                <label class="form-label"><i class="fas fa-comment-dots"></i> شروع کا پیغام</label>
                <textarea id="startMessage" rows="2" dir="rtl" placeholder="یہاں شروع کا پیغام لکھیں..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-brain"></i> سسٹم پرامپٹ (بوٹ ٹریننگ)</label>
                <textarea id="rolePrompt" rows="8" dir="rtl" placeholder="بوٹ کو ٹرین کرنے کے لیے یہاں پرامپٹ لکھیں..."></textarea>
                <div class="info-note"><i class="fas fa-edit"></i> نوٹ: بوٹ صرف اردو رسم الخط میں جواب دے گا!</div>
            </div>
            <button class="btn-primary" id="trainBtn"><i class="fas fa-graduation-cap"></i> بوٹ ٹرین کریں</button>
            <button class="btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> ڈیفالٹ پر ری سیٹ</button>
        </div>
    </div>
    <script src="static\app.js"></script>
    </body>
    </html>
